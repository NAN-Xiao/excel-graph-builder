# ============================================================
#   Excel Graph Builder 配置文件
#   部署到新电脑时，按实际环境修改以下配置
#   路径相对于 dist/ 目录（即 indexer.exe 所在目录）
# ============================================================

# Excel 数据根目录（默认 = dist 的上级目录）
data_root: ..

# 构建产出目录（默认 = 上级目录下的 graph 文件夹）
graph_dir: ..\graph

# Windows 计划任务名称（同一台机器部署多实例时需改名避免冲突）
task_name: ExcelGraphBuilder

# 每天自动执行时间（24h 格式）
schedule_time: 02:00

# ============================================================
#   Embedding 预构建（可选）
#   build 阶段提前计算向量，服务端启动时直接加载 .npy 缓存
#   若未配置或计算失败，服务端会在启动时自动计算（fallback）
# ============================================================

# 拥有 sentence_transformers 的 Python 解释器（绝对路径）
embedding_python: C:\Users\ELEX-GM0298\AppData\Local\Programs\Python\Python311\python.exe

# SentenceTransformer 模型名（需与服务端 rag.yaml 中一致）
embedding_model: BAAI/bge-small-zh-v1.5

# 模型本地缓存目录（绝对路径，指向服务端已下载的模型）
embedding_cache_folder: D:\work\A_elex\策划表\slg-config-chain-twd\models

# 计算设备
embedding_device: cpu
